mainSections   = ["post"]
rssFullContent = true
favicon        = "img/avatar.webp"

[footer]
    since = 2026

[sidebar]
    subtitle = "Accept what is, imagine what’s next."
    avatar   = "img/avatar.webp"

[article]
    [article.license]
        enabled = true
        default = "Licensed under [CC BY-NC-SA 4.0](https://creativecommons.org/licenses/by-nc-sa/4.0/)"

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page     = [{ type = "toc" }]

[comments]
    enabled = true
    provider = "giscus"

[comments.giscus]
    repo = "LGCR837/lgcr837.github.io"
    repoId = "R_kgDOSGj-Ag"
    category = "General"
    categoryId = "DIC_kwDOSGj-As4C7tiD"
    mapping = "pathname"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "top"
    theme = "preferred_color_scheme"
    lang = "zh-CN"
    loading = "lazy"

# GDPR Cookie Consent Configuration
# When enabled, analytics and functional cookies require user consent
[cookies]
    enabled = false

    [cookies.categories]
        analytics  = true
        functional = true

